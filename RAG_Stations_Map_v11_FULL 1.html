  const map = L.map('map').setView([48.2, 9.0], 4);
  const cartoLight = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {maxZoom:20, subdomains:'abcd'}).addTo(map);
const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom:12});
L.control.layers({ 'CARTO Light': cartoLight, 'OSM Standard': osmLayer }).addTo(map);

  const airportsCSV = 'https://davidmegginson.github.io/ourairports-data/airports.csv';
  function toLookup(rows) {
    const idx = {};
    for (const r of rows) {
      const iata = (r['iata_code'] || '').toUpperCase();
      if (!iata) continue;
      const lat = parseFloat(r['latitude_deg']);
      const lon = parseFloat(r['longitude_deg']);
      if (isFinite(lat) && isFinite(lon)) { idx[iata] = { name: r['name'] || '', country: r['iso_country'] || '', lat, lon }; }
    }
    return idx;
  }

  Papa.parse(airportsCSV, {
    header: true, download: true, dynamicTyping: false, skipEmptyLines: true,
    complete: (results) => {
      const lookup = toLookup(results.data);
      const layerGroup = L.layerGroup().addTo(map);
      const bounds = [];
      const missing = [];
      for (const s of stations) {
        const rec = lookup[s.code];
        if (!rec) { missing.push(s.code); continue; }
        const marker = L.circleMarker([rec.lat, rec.lon], { radius: 6, color: '#333', weight: 1, fillColor: s.color, fillOpacity: 0.9 });
        const popup = `<div style=\"min-width:260px;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif\"><div style=\"font-weight:600;font-size:14px;margin-bottom:4px\">${s.code} — ${rec.name}</div><div style=\"font-size:12px;margin-bottom:2px\"><b>Category:</b> ${s.category}</div>${s.turnRank ? `<div style=\\\"font-size:12px\\\"><b>Turn Performance:</b> #${s.turnRank} of ${s.turnTotal} (${s.category})</div>` : '<div style=\\\"font-size:12px\\\"><b>Turn Performance:</b> n/a — no data</div>'}${s.engine ? `<div style=\\\"font-size:12px\\\"><b>Engine start on stand:</b> ${s.engine}</div>` : ''}${s.justification ? `<div style=\\\"font-size:12px\\\"><b>Justification:</b> ${s.justification}</div>` : ''}${rec.country ? `<div style=\\\"font-size:12px;margin-top:4px;opacity:.8\\\">Country: ${rec.country}</div>` : ''}</div>`;
            + `<div style="font-weight:600;font-size:14px;margin-bottom:4px">${s.code} — ${rec.name}</div>`
            + `<div style="font-size:12px;margin-bottom:2px"><b>Category:</b> ${s.category}</div>`
            + (s.justification ? `<div style="font-size:12px"><b>Justification:</b> ${s.justification}</div>` : '')
            + (rec.country ? `<div style="font-size:12px;margin-top:4px;opacity:.8">Country: ${rec.country}</div>` : '')
            + `</div>`;
        marker.bindPopup(popup);
        marker.addTo(layerGroup);
        bounds.push([rec.lat, rec.lon]);
      }
      if (bounds.length) { map.fitBounds(bounds, { padding: [30, 30] }); }
      if (missing.length) { console.warn('No coordinate match for IATA codes:', missing.join(', ')); }
    }
  });
